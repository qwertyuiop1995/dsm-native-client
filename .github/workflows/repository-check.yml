name: Repository Check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 检查必要文件
        shell: bash
        run: |
          set -euo pipefail
          test -f README.md
          test -f docs/api/DSM_WEB_API_REFERENCE_ZH.md
          test -f docs/development/NATIVE_DSM_FILE_APP_DEVELOPMENT_PLAN_ZH.md
          test -f docs/progress/STATUS.md
          test -f contracts/README.md

      - name: 校验 JSON
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r -d '' file; do
            python -m json.tool "$file" >/dev/null
          done < <(find contracts -type f -name '*.json' -print0)

      - name: 校验 Codex Skill 引导脚本
        run: python -m unittest discover -s tools/codex/tests -p 'test_*.py'

      - name: 禁止敏感文件类型
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files | grep -E '\.(har|pcap|pcapng|p12|pfx|mobileprovision|keystore|jks)$'; then
            echo "仓库包含禁止提交的敏感文件类型"
            exit 1
          fi
