name: Apple Build

on:
  push:
    paths:
      - "apple/**"
      - ".github/workflows/apple-build.yml"
  pull_request:
    paths:
      - "apple/**"
      - ".github/workflows/apple-build.yml"

permissions:
  contents: read

jobs:
  test-and-build:
    runs-on: macos-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 运行共享包测试
        run: swift test --package-path apple

      - name: 打包 macOS 应用
        working-directory: apple/Apps/DsmMac
        env:
          LANSTASH_NON_INTERACTIVE: 1
          LANSTASH_BUILD_TYPE: Release
          LANSTASH_TARGET_ARCH: native
          LANSTASH_RUN_AFTER_PACKAGE: 0
        run: ./package.sh

      - name: 上传打包产物
        uses: actions/upload-artifact@v4
        with:
          name: LanStash-macOS
          path: |
            apple/Apps/DsmMac/dist/*.app
            apple/Apps/DsmMac/dist/*.dmg
          if-no-files-found: error
